name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      # npm install, not npm ci: rolldown (pulled in by vitest) declares optional wasm
      # bindings whose transitive deps npm records in the lockfile inconsistently across
      # OS/npm versions, so the strict `npm ci` sync check fails on the Linux runner even
      # when the lockfile installs cleanly locally. `npm install` reconciles and installs.
      - run: npm install
      - run: npm run typecheck
      - run: npm test
